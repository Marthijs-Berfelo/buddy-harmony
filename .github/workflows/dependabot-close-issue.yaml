name: Close Dependabot issue on PR close

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  issues: write

jobs:
  close-issue:
    name: Close linked issue
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.merged == false
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Close linked issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          issues=$(gh pr view $PR_NUMBER --repo $REPO --json closingIssuesReferences --jq '.closingIssuesReferences[].number')
          for issue in $issues; do
            gh issue close $issue --repo $REPO --comment "Superseded by a newer dependency version, closing with PR #$PR_NUMBER."
          done

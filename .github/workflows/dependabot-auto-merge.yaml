name: Dependabot auto-merge
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  metadata:
    name: Fetch metadata
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  approve:
    name: Approve patch/minor bumps
    needs:
      - metadata
    if: |
      needs.metadata.outputs.update-type == 'version-update:semver-patch' ||
      needs.metadata.outputs.update-type == 'version-update:semver-minor'
    uses: ./.github/workflows/job.auto-approve.yaml
    with:
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      APPROVE_TOKEN: ${{ secrets.APPROVE_APP_TOKEN }}

  auto-merge:
    name: Auto-merge
    runs-on: ubuntu-latest
    needs:
      - metadata
      - approve
    if: |
      needs.metadata.outputs.update-type == 'version-update:semver-patch' ||
      needs.metadata.outputs.update-type == 'version-update:semver-minor'
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

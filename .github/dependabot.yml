# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 5
      semver-major-days: 14
    reviewers:
      - "Marthijs-Berfelo"
    rebase-strategy: auto
    ignore:
      # eslint-plugin-react does not support eslint 10 yet
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint"
      react:
        patterns:
          - "react"
          - "react-dom"
      types-react:
        patterns:
          - "@types/react"
          - "@types/react-dom"
      testing-library:
        patterns:
          - "@testing-library/*"
      fortawesome:
        patterns:
          - "@fortawesome/*"
      i18next:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "globals"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      commitizen:
        patterns:
          - "commitizen"
          - "cz-conventional-changelog"
          - "cosmiconfig"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 5
    reviewers:
      - "Marthijs-Berfelo"
    rebase-strategy: auto
